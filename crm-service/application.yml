spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/crm_db}
    username: ${DB_USERNAME:aliyara29}
    password: ${DB_PASSWORD:Yara2001}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URL:http://localhost:8079/realms/prolance}

  # flyway:
  #   enabled: false

logging:
  level:
    com.aliyara.companyservice: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans,refresh

services:
  tenant-service:
    url: http://localhost:8081/api/v1/
    base-url: http://localhost:8081/
