spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/tenant_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URL:http://localhost:8079/realms/prolance}

  # flyway:
  #   enabled: false

keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8079}
  realm: ${KEYCLOAK_REALM:prolance}
  admin:
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:tenant-service-client}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
  user:
    client-id: ${KEYCLOAK_USER_CLIENT_ID:prolance-frontend-client}

logging:
  level:
    com.aliyara.companyservice: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans,refresh
